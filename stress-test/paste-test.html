<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LDM-V3 Paste Test</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #fff; color: #0f172a; font-family: Georgia, serif; font-size: 15px; line-height: 1.85; max-width: 880px; margin: 0 auto; padding: 32px 32px 80px; }
    .meta { font-family: system-ui, sans-serif; font-size: 11px; color: #64748b; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 6px; padding: 8px 14px; margin-bottom: 28px; display: flex; gap: 16px; flex-wrap: wrap; align-items: center; }
    .meta strong { color: #0f172a; }
    .meta a { color: #1d4ed8; text-decoration: none; margin-left: auto; }
    #content { white-space: pre-wrap; }
    .empty { color: #94a3b8; font-family: system-ui, sans-serif; font-size: 13px; padding: 40px 0; text-align: center; }
  </style>
</head>
<body>
  <div class="meta">
    <span><strong>LDM-V3 Paste Test</strong> — extension will scan this page automatically</span>
    <span id="metaSource"></span>
    <span id="metaTime"></span>
    <a href="harness.html">← Back to harness</a>
  </div>
  <div id="content"><div class="empty">No text found — go back to the harness and paste text before opening this page.</div></div>

  <script>
    const text   = localStorage.getItem('ldm_paste_text');
    const source = localStorage.getItem('ldm_paste_source');
    if (text) {
      document.getElementById('content').textContent = text;
      document.title = source ? `LDM Test — ${source}` : 'LDM-V3 Paste Test';
    }
    if (source) document.getElementById('metaSource').textContent = `Source: ${source}`;
    document.getElementById('metaTime').textContent = new Date().toLocaleString();
  </script>
</body>
</html>
